<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NeoDoc</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NeoDoc">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <!-- Theme detection runs synchronously to prevent flash of wrong theme -->
  <script src="/js/theme-init.js"></script>
  <!-- Inter font self-hosted; no external font CDN -->
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<!-- ── App Shell ──────────────────────────────────────── -->
<div id="app-shell">

  <!-- Mobile sidebar overlay -->
  <div id="mobile-overlay"></div>

  <!-- ── Sidebar ────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="9" y1="13" x2="15" y2="13"/>
          <line x1="9" y1="17" x2="13" y2="17"/>
        </svg>
      </div>
      <span class="sidebar-logo-text" id="app-name-label">NeoDoc</span>
    </div>

    <!-- Compose-style upload button -->
    <div class="sidebar-compose">
      <button class="btn-compose" id="sidebar-upload-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Upload Document
      </button>
    </div>

    <div class="sidebar-section">
      <div class="nav-item active" data-view="documents" id="nav-documents">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        All Documents
        <span class="nav-badge" id="doc-count-badge">0</span>
      </div>
      <div class="nav-item" data-view="chat" id="nav-chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Ask AI
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Labels</div>
      <div class="sidebar-tags" id="sidebar-tags-list">
        <div style="display:flex;align-items:center;gap:.5rem;padding:.2rem .4rem;color:var(--text-3);font-size:.82rem">
          <div class="spinner" style="width:12px;height:12px;border-width:1px;"></div> Loading…
        </div>
      </div>
      <div class="nav-item" data-view="tags" id="nav-tags" style="margin-top:.3rem">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        Manage Tags
      </div>
    </div>

    <div class="sidebar-section">
      <div class="nav-item" data-view="types" id="nav-types">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Document Types
      </div>
    </div>

    <div class="sidebar-section">
      <div class="nav-item" id="nav-signing" onclick="location.href='/signing'" style="cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        Signing
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">People</div>
      <div class="sidebar-tags" id="sidebar-correspondents-list">
        <div style="display:flex;align-items:center;gap:.5rem;padding:.2rem .4rem;color:var(--text-3);font-size:.82rem">
          <div class="spinner" style="width:12px;height:12px;border-width:1px;"></div> Loading…
        </div>
      </div>
      <div class="nav-item" data-view="correspondents" id="nav-correspondents">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Manage Correspondents
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-footer-action" id="nav-settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </div>
      <div class="sidebar-footer-action" id="signout-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────── -->
  <div id="main">

    <!-- Topbar -->
    <div id="topbar">
      <button class="icon-btn" id="mobile-menu-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h2 id="page-title">All Documents</h2>
      <div id="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-input" placeholder="Search documents…" autocomplete="off">
      </div>
      <!-- View toggle -->
      <div style="display:flex;gap:.3rem">
        <button class="icon-btn active" id="view-grid-btn" title="Grid view">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="icon-btn" id="view-list-btn" title="List view">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button class="btn btn-ghost btn-sm" id="topbar-select-btn" title="Select documents" style="gap:.35rem">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="4" height="4" rx="1"/><line x1="10" y1="7" x2="21" y2="7"/><rect x="3" y="12" width="4" height="4" rx="1"/><line x1="10" y1="14" x2="21" y2="14"/><rect x="3" y="19" width="4" height="4" rx="1"/><line x1="10" y1="21" x2="21" y2="21"/></svg>
          Select
        </button>
      </div>
      <!-- Sort -->
      <select id="sort-select" style="max-width:140px;padding:.38rem .6rem">
        <option value="created_at:desc">Newest first</option>
        <option value="created_at:asc">Oldest first</option>
        <option value="title:asc">Name A–Z</option>
        <option value="title:desc">Name Z–A</option>
        <option value="file_size:desc">Largest first</option>
      </select>
      <button class="btn btn-primary btn-sm" id="topbar-upload-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Upload
      </button>
    </div>

    <!-- Content area — swapped by JS -->
    <div id="content">
      <div class="empty-state" style="margin-top:3rem">
        <div class="spinner" style="width:32px;height:32px;border-width:3px;"></div>
        <p>Loading…</p>
      </div>
    </div>
  </div>
</div>

<!-- ── Settings Modal ────────────────────────────────── -->
<div class="modal-overlay" id="settings-overlay" style="display:none">
  <div class="settings-modal">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="icon-btn" id="settings-close">✕</button>
    </div>
    <div class="settings-body">
      <div class="settings-tabs" id="settings-tab-list">
        <button class="stab active" data-stab="ai">AI</button>
        <button class="stab" data-stab="mcp">MCP / API</button>
        <button class="stab" data-stab="security">Security</button>
        <button class="stab" data-stab="smtp">Email / SMTP</button>
      </div>
      <div class="settings-content" id="settings-content">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>
</div>

<!-- ── Toast container ────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Modal container ───────────────────────────────── -->
<div id="modal-root"></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
