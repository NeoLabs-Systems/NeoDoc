<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocumentNeo — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📂</text></svg>">
  <!-- Match system colour scheme before CSS renders to prevent flash -->
  <!-- Theme detection runs synchronously to prevent flash of wrong theme -->
  <script src="/js/theme-init.js"></script>
  <!-- Inter font self-hosted; no external font CDN -->
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="login-page">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <span class="login-logo-text">DocumentNeo</span>
    </div>

    <!-- Segmented pill tab switcher -->
    <div class="login-tabs" id="tab-switcher">
      <div class="login-tab active" id="tab-login">Sign In</div>
      <div class="login-tab" id="tab-register">Create Account</div>
    </div>

    <!-- Sign In form -->
    <form class="login-form" id="login-form">
      <div class="form-group">
        <label for="login-id">Username or Email</label>
        <input type="text" id="login-id" autocomplete="username" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="btn-submit" id="login-btn">Sign In</button>
    </form>

    <!-- 2FA form -->
    <form class="login-form" id="login-2fa-form" style="display:none">
      <div class="form-group">
        <label for="login-totp">Two-Factor Authentication</label>
        <input type="text" id="login-totp" autocomplete="one-time-code" required placeholder="6-digit code" pattern="[0-9]*" inputmode="numeric" minlength="6" maxlength="6">
      </div>
      <div class="login-error" id="login-2fa-error"></div>
      <button type="submit" class="btn-submit" id="login-2fa-btn">Verify & Sign In</button>
      <button type="button" class="btn-submit" id="login-2fa-back" style="background:var(--bg-3);color:var(--text-1);margin-top:0.5rem">Back</button>
    </form>

    <!-- Register form -->
    <form class="login-form" id="register-form" style="display:none">
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" autocomplete="username" required placeholder="johndoe" minlength="3" maxlength="50">
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" autocomplete="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="reg-pass">Password</label>
        <input type="password" id="reg-pass" autocomplete="new-password" required placeholder="Min. 8 characters" minlength="8">
      </div>
      <div class="form-group">
        <label for="reg-pass2">Confirm Password</label>
        <input type="password" id="reg-pass2" autocomplete="new-password" required placeholder="Repeat password">
      </div>
      <div class="login-error" id="reg-error"></div>
      <button type="submit" class="btn-submit" id="reg-btn">Create Account</button>
      <p class="login-hint">First account created becomes admin.</p>
    </form>
  </div>
</div>

<div id="toast-container"></div>

<script src="/js/login.js"></script>
</body>
</html>
